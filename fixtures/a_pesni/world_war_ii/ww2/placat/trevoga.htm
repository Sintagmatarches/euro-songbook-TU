  <strong>ТРЕВОГА</strong><br>
  <br>
  Советский плакат, Н. Тирса, 1942-1943<br>
  <br>
  <br>
  <em>Тревога! На небо взлетели<br>
  Столбы голубого огня.<br>
  Гремят по невидимой цели<br>
  Зенитки, наш город храня.<br>
  <br>
  И знает разбуженный город:<br>
  Зенитчик без промаха бьет.<br>
  И, взрывом которким распорот,<br>
  В раждебный горит самолет.<br>
  <br>
  С. Спасский, Ленинград</em></font><br>
