<p><font face="Verdana, Arial, Helvetica, sans-serif">Во всю ночь мы темную, <br>
  Осеннюю, <br>
  Долгую, <br>
  Ухнем! <br>
  Грянем! <br>
  Нам кричит дядя «давай» — <br>
  Мы даем, <br>
  Сильно гребем... <br>
  Ухнем! <br>
  Грянем! </font></p>
