<p><font size="2">Как на свете живется, <br>
  Вот та песня поется, <br>
  Вот та песня поется: <br>
  «Через золото слеза льется, <br>
  Руда кровью обмывается». <br>
  Слезы льются рекой, <br>
  Рекой, широкой рекой, <br>
  Пока могилку твою <br>
  Принакроет травой зеленой. </font></p>
