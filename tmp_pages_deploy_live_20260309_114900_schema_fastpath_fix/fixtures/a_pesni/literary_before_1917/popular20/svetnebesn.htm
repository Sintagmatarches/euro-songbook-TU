<font color="#FF0000" size="2" face="Verdana, Arial, Helvetica, sans-serif"><strong>СВЕТ НЕБЕСНЫЙ 
ВОССИЯЕТ </strong> </font><font face="Verdana, Arial, Helvetica, sans-serif"> 
<p><font size="2">Свет небесный воссияет,<br>
  Барабан зарю пробьет -<br>
  Старший двери отворяет,<br>
  Писарь требовать идет.</font></p>
<p><font size="2">Нас не видно за стенами,<br>
  Каково мы здесь живем;<br>
  Бог, Творец небесный, с нами,<br>
  Мы и здесь не пропадем... </font></p>
</font>
