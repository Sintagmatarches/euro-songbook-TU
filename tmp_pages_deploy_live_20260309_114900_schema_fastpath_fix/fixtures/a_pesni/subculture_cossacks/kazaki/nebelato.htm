<br>
Ой, да не бела то заря,<br>
Зоренька, братцы, занималася,<br>
Занима- ах, зоренька, братцы,<br>
Занима- занималася.<br>
<br>
Не то ясно солнышко,<br>
Братцы, из гор выкаталося,<br>
Выката- ах, солнышко, братцы,<br>
Выката- выкаталося.<br>
