  <div>
  <h1>Ой, по вашій, кумцьо</h1><b>Сл:</b>&nbsp;<i>народні</i> &nbsp;<br><b>Муз:</b>&nbsp;<i>народна</i><br><br><br>Ой, по вашій, кумцьо,<br />
Стрісі лазили качата,<br />
Дай вам, Боже, молодята,<br />
До року близнята.<br />
<br />
Ой, зацвіло, кумцьо, зілля<br />
На ґанку, на ґанку,<br />
Таку маєш, хлопче, жінку,<br />
Як з театру ляльку.
<br />
