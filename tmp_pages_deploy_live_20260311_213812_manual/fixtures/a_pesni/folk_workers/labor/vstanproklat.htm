<p><font face="Verdana, Arial, Helvetica, sans-serif">Встань, проклятая машина,<br>
  Дай хоть раз мне отдохнуть <br>
  Дай хоть раз усталоё грудью <br>
  Посвободнее вздохнуть!<br>
  Но не слушает машина, — <br>
  Знай стучит себе, стучит.<br>
  «Отдохнешь в сырой могиле», — <br>
  Этот стук мне говорит. </font></p>
<p><font size="1" face="Verdana, Arial, Helvetica, sans-serif">Русские народные

  </font></p>
