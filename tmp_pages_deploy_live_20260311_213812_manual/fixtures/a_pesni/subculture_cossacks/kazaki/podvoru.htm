<br>
По двору ходила,<br>
Коника водила,<br>
Коника водила<br>
Своего милого.<br>
<br>
Коника водила<br>
Своего милого,<br>
Седлать посылала,<br>
Словечко сказала.<br>
<br>
Седелице ново,<br>
Повода шелковы.<br>
Седлом оседлала,<br>
Словечко сказала.<br>
